<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cálculo da Nota Final</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      margin: auto;
      margin-top: 30px;
    }
    input {
      width: 60px;
      margin: 3px;
      text-align: center;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="box">
<h2>Nota Final</h2>

<h3>PBL (20%)</h3>
<input id="pbl1">
<input id="pbl2">
<input id="pbl3">
<input id="pbl4">

<h3>gRAT (10%)</h3>
<input id="grat1">
<input id="grat2">
<input id="grat3">
<input id="grat4">
<input id="grat5">

<h3>iRAT (15%)</h3>
<input id="irat1">
<input id="irat2">
<input id="irat3">
<input id="irat4">
<input id="irat5">

<h3>Prova (34%)</h3>
<input id="prova">

<h3>LPI (7%)</h3>
<input id="lpi">

<h3>LMF (14%)</h3>
<input id="lmf">

<br>
<button onclick="calcular()">Calcular</button>

<h2 id="resultado"></h2>
</div>

<script>
function media(lista) {
  let soma = 0;
  lista.forEach(id => {
    soma += parseFloat(document.getElementById(id).value) || 0;
  });
  return soma / lista.length;
}

function calcular() {
  let pbl = media(["pbl1","pbl2","pbl3","pbl4"]);
  let grat = media(["grat1","grat2","grat3","grat4","grat5"]);
  let irat = media(["irat1","irat2","irat3","irat4","irat5"]);

  let prova = parseFloat(document.getElementById("prova").value) || 0;
  let lpi = parseFloat(document.getElementById("lpi").value) || 0;
  let lmf = parseFloat(document.getElementById("lmf").value) || 0;

  let final =
    (pbl * 0.20) +
    (grat * 0.10) +
    (irat * 0.15) +
    (prova * 0.34) +
    (lpi * 0.07) +
    (lmf * 0.14);

  document.getElementById("resultado").innerText =
    "Nota Final: " + final.toFixed(2);
}
</script>

</body>
</html>
